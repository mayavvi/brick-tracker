<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}打工人の进度小站{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/tailwind.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}" />
  <script defer src="{{ url_for('static', path='js/vendor/alpine-collapse.min.js') }}"></script>
  <script defer src="{{ url_for('static', path='js/vendor/alpine.min.js') }}"></script>
</head>
<body class="h-full bg-warm-50 text-gray-800 antialiased">
  {% block body %}{% endblock %}
  <script>
  (function() {
    var base = window.location.pathname.replace(/\/+$/, "");
    window.API_BASE = base;
    if (!base) return;
    var _f = window.fetch;
    window.fetch = function(input) {
      if (typeof input === "string" && input.startsWith("/api/")) {
        arguments[0] = base + input;
      }
      return _f.apply(this, arguments);
    };
  })();
  </script>
  <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
